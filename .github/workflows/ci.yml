name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp check

  unit-test:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp test -- --exclude "**/integration/**" --exclude "tests/e2e/**" --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          if-no-files-found: ignore

  integration-test:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp test -- packages/*/src/__tests__/integration/**/*.test.ts --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage/
          if-no-files-found: ignore

  e2e-test:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp run build
      - run: vp test -- tests/e2e/**/*.test.ts --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-e2e
          path: coverage/
          if-no-files-found: ignore

  smoke-test:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true

      - run: vp install
      - run: vp run build
      - run: bash scripts/smoke.sh
